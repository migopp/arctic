[package]
name = "arctic"
version = "0.1.0"
edition = "2021"

[features]
default = []
stat = ["dep:serde", "dep:hdrhistogram"]
opt-node3-get = []
opt-node15-get = []
opt-membarrier = ["dep:libc"]
validate = []

[dependencies]
hdrhistogram = { version = "7.5.4", optional = true, default-features = false }
libc = { version = "0.2.176", optional = true }
ribbit = { git = "https://github.com/nwtnni/ribbit.git", features = ["atomic-u128"] }
serde = { version = "1.0.219", optional = true, features = ["derive"] }
thread_local = "1.1.9"

[dev-dependencies]
bustle = "0.5"
rand = "0.9"

[[bench]]
name = "sequential"
harness = false
